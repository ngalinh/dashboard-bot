# Giai đoạn ĐẦU TIÊN — chỉ HTTP, lấy chứng chỉ Let’s Encrypt bằng webroot.
# Sinh: node scripts/generate-nginx-site.cjs --http-only --out data/generated/nginx-site.conf
#
# Sau khi certbot certonly --webroot thành công, sinh lại site đầy đủ (HTTPS) và reload Nginx.

upstream bot_platform {
    server 127.0.0.1:__PLATFORM_PORT__;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_pass http://bot_platform;
    }
}
