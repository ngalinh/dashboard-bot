# Sinh bởi: node scripts/generate-nginx-site.cjs
# Domain mẫu: ai.basso.vn — toàn bộ / → Platform (/admin, /platform/api, /b/{id}/)
#
# Yêu cầu: include http-snippet-map.conf trong khối http { } (xem file đó).
# SSL miễn phí + renew: platform/docs/SSL-LETSENCRYPT.md
#
#   sudo ln -sf ... /etc/nginx/sites-enabled/bot-platform
#   sudo nginx -t && sudo systemctl reload nginx

upstream bot_platform {
    server 127.0.0.1:__PLATFORM_PORT__;
    keepalive 32;
}

# Cổng 80 — ACME webroot + chuyển hướng HTTPS (renew không cần tắt Nginx)
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;

    ssl_certificate     __CERT_PATH__;
    ssl_certificate_key __KEY_PATH__;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL_BOT_PLATFORM:10m;

    client_max_body_size 120M;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_pass http://bot_platform;
    }
}
