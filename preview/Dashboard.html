<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0F2A3F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Basso · AI Agent Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: #FFFFFF;
    color: #0F2A3F;
    -webkit-font-smoothing: antialiased;
  }
  body { min-height: 100vh; }
  a { color: inherit; }

  .app-header {
    background: #0F2A3F;
    color: white;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    position: sticky;
    top: 0;
    z-index: 40;
  }
  .logo-basso {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.02em;
  }
  .logo-arrow { width: 28px; height: 14px; }
  .header-right {
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; color: #94B8CD;
  }
  .header-right strong { color: white; font-weight: 600; margin-left: 4px; }
  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: white;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.08); }

  .pulse-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #10B981;
    box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5);
    animation: pulse 2s infinite;
  }

  /* Mobile / PWA responsive (< 640px) */
  @media (max-width: 640px) {
    .app-header {
      height: 56px;
      padding: 0 16px;
    }
    .logo-basso { font-size: 18px; }
    .logo-arrow { width: 22px; height: 11px; }
    .header-right span { display: none; }
    .header-right strong { display: none; }
    .bold-container { padding: 16px 14px 32px !important; }
    .bold-header { margin-bottom: 18px !important; }
    .bold-title { font-size: 24px !important; line-height: 1.15 !important; }
    .bold-subtitle { font-size: 13px !important; }
    .bold-grid {
      grid-template-columns: 1fr !important;
      gap: 12px !important;
      max-width: 100% !important;
    }
  }
  /* Small tablet (641–900px): 2 columns */
  @media (min-width: 641px) and (max-width: 900px) {
    .bold-grid {
      grid-template-columns: repeat(2, 1fr) !important;
    }
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6); }
    70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
    100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
  }
  @keyframes pulseDot {
    0%   { transform: scale(1);   opacity: 0.7; }
    70%  { transform: scale(2.2); opacity: 0;   }
    100% { transform: scale(2.2); opacity: 0;   }
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; border: 2px solid #F8FAFC; }
  ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
</style>
</head>

// 6 avatar styles - all original geometric/abstract designs
// No manga character reproduction; uses color + shape + motif to convey personality

// ============================================================
// STYLE 1: MONOGRAM - 5 gradient variants
// ============================================================

// Helper: darken/lighten a hex color
function shade(hex, amount) {
  const h = hex.replace('#', '');
  const r = parseInt(h.substr(0, 2), 16);
  const g = parseInt(h.substr(2, 2), 16);
  const b = parseInt(h.substr(4, 2), 16);
  const adj = (c) => Math.max(0, Math.min(255, Math.round(c + amount)));
  return `#${adj(r).toString(16).padStart(2, '0')}${adj(g).toString(16).padStart(2, '0')}${adj(b).toString(16).padStart(2, '0')}`;
}

function AvatarMonogram({ agent, size = 48, variant = 'duotone' }) {
  const letter = agent.alias[0].toUpperCase();
  const p = agent.palette;
  const gid = `mono-${variant}-${agent.id}`;
  const textStyle = {
    fontFamily: "'Inter', sans-serif",
    fontWeight: 800,
    fontSize: 22,
    letterSpacing: '-0.04em',
  };

  // VARIANT A: Duotone - same-family dark-to-light vertical gradient (refined, mature)
  if (variant === 'duotone') {
    const dark = shade(p.primary, -30);
    const light = shade(p.primary, 25);
    return (
      <svg width={size} height={size} viewBox="0 0 48 48" style={{ display: 'block' }}>
        <defs>
          <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={light} />
            <stop offset="100%" stopColor={dark} />
          </linearGradient>
        </defs>
        <rect x="2" y="2" width="44" height="44" rx="14" fill={`url(#${gid})`} />
        <rect x="2" y="2" width="44" height="22" rx="14" fill="white" opacity="0.12" />
        <text x="24" y="32" textAnchor="middle" fill="white" {...textStyle}>{letter}</text>
      </svg>
    );
  }

  // VARIANT B: Mesh - soft radial blobs over agent's bg (airy, modern)
  if (variant === 'mesh') {
    return (
      <svg width={size} height={size} viewBox="0 0 48 48" style={{ display: 'block' }}>
        <defs>
          <radialGradient id={`${gid}-a`} cx="30%" cy="25%" r="70%">
            <stop offset="0%" stopColor={p.secondary} stopOpacity="0.95" />
            <stop offset="100%" stopColor={p.secondary} stopOpacity="0" />
          </radialGradient>
          <radialGradient id={`${gid}-b`} cx="75%" cy="80%" r="70%">
            <stop offset="0%" stopColor={p.primary} stopOpacity="1" />
            <stop offset="100%" stopColor={p.primary} stopOpacity="0" />
          </radialGradient>
          <clipPath id={`${gid}-clip`}>
            <rect x="2" y="2" width="44" height="44" rx="14" />
          </clipPath>
        </defs>
        <g clipPath={`url(#${gid}-clip)`}>
          <rect x="2" y="2" width="44" height="44" fill={p.bg} />
          <rect x="2" y="2" width="44" height="44" fill={`url(#${gid}-a)`} />
          <rect x="2" y="2" width="44" height="44" fill={`url(#${gid}-b)`} />
        </g>
        <text x="24" y="32" textAnchor="middle" fill={shade(p.primary, -40)} {...textStyle}>{letter}</text>
      </svg>
    );
  }

  // VARIANT C: Sunset - warm diagonal gradient using primary + accent
  if (variant === 'sunset') {
    return (
      <svg width={size} height={size} viewBox="0 0 48 48" style={{ display: 'block' }}>
        <defs>
          <linearGradient id={gid} x1="0" y1="1" x2="1" y2="0">
            <stop offset="0%" stopColor={p.primary} />
            <stop offset="55%" stopColor={p.accent || p.secondary} />
            <stop offset="100%" stopColor={p.secondary} />
          </linearGradient>
        </defs>
        <rect x="2" y="2" width="44" height="44" rx="14" fill={`url(#${gid})`} />
        <text x="24" y="32" textAnchor="middle" fill="white" {...textStyle}>{letter}</text>
      </svg>
    );
  }

  // VARIANT D: Soft - pastel fill, colored letter (gentle, editorial)
  if (variant === 'soft') {
    return (
      <svg width={size} height={size} viewBox="0 0 48 48" style={{ display: 'block' }}>
        <defs>
          <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="white" />
            <stop offset="100%" stopColor={p.bg} />
          </linearGradient>
        </defs>
        <rect x="2" y="2" width="44" height="44" rx="14" fill={`url(#${gid})`} stroke={p.primary} strokeOpacity="0.25" strokeWidth="1" />
        <text x="24" y="32" textAnchor="middle" fill={shade(p.primary, -20)} {...textStyle}>{letter}</text>
        <circle cx="38" cy="10" r="2.5" fill={p.primary} />
      </svg>
    );
  }

  // VARIANT E: Glow - dark base with inner gradient spotlight (premium, tech)
  if (variant === 'glow') {
    return (
      <svg width={size} height={size} viewBox="0 0 48 48" style={{ display: 'block' }}>
        <defs>
          <radialGradient id={gid} cx="50%" cy="50%" r="55%">
            <stop offset="0%" stopColor={p.primary} stopOpacity="1" />
            <stop offset="70%" stopColor={shade(p.primary, -60)} stopOpacity="1" />
            <stop offset="100%" stopColor="#0F1B26" stopOpacity="1" />
          </radialGradient>
        </defs>
        <rect x="2" y="2" width="44" height="44" rx="14" fill={`url(#${gid})`} />
        <rect x="2" y="2" width="44" height="44" rx="14" fill="none" stroke={p.primary} strokeOpacity="0.4" strokeWidth="1" />
        <text x="24" y="32" textAnchor="middle" fill="white" {...textStyle}>{letter}</text>
      </svg>
    );
  }

  // fallback — original
  return (
    <svg width={size} height={size} viewBox="0 0 48 48" style={{ display: 'block' }}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor={p.primary} />
          <stop offset="100%" stopColor={p.secondary} />
        </linearGradient>
      </defs>
      <rect x="2" y="2" width="44" height="44" rx="14" fill={`url(#${gid})`} />
      <text x="24" y="32" textAnchor="middle" fill="white" {...textStyle}>{letter}</text>
    </svg>
  );
}

// ============================================================
// STYLE 4: ORBIT - A ring with a central dot in agent color
// ============================================================
function AvatarOrbit({ agent, size = 48 }) {
  const p = agent.palette;
  // deterministic positions based on personality
  const seed = agent.id.charCodeAt(0);
  const angle1 = (seed * 37) % 360;
  const angle2 = (angle1 + 140) % 360;
  const r = 18;
  const cx = 24, cy = 24;
  const rad = (a) => (a * Math.PI) / 180;
  return (
    <svg width={size} height={size} viewBox="0 0 48 48" style={{ display: 'block' }}>
      <rect width="48" height="48" rx="14" fill={p.bg} />
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={p.primary} strokeWidth="1.5" strokeDasharray="2 3" opacity="0.5" />
      <circle cx={cx} cy={cy} r={10} fill={p.primary} />
      <circle cx={cx + r * Math.cos(rad(angle1))} cy={cy + r * Math.sin(rad(angle1))} r="3.5" fill={p.secondary} />
      <circle cx={cx + r * Math.cos(rad(angle2))} cy={cy + r * Math.sin(rad(angle2))} r="2.5" fill={p.accent} />
      <text x="24" y="28" textAnchor="middle" fontFamily="'JetBrains Mono', monospace" fontWeight="700" fontSize="10" fill="white">
        {agent.alias[0].toUpperCase()}
      </text>
    </svg>
  );
}

        {/* dot eyes */}
        <circle cx="19" cy="24" r="0.9" fill={stroke} />
        <circle cx="29" cy="24" r="0.9" fill={stroke} />
        {/* simple mouth */}
        <path d="M22 30 L26 30" />
      </g>
    ),
    // Chaien: square strong face, big jaw
    chaien: (
      <g stroke={stroke} strokeWidth={sw} fill="none" strokeLinecap="round" strokeLinejoin="round">
        {/* flat-top hair */}
        <path d="M11 14 L37 14 L37 18 L11 18 Z" fill={p.bg} />
        {/* square face */}
        <path d="M12 18 L12 32 Q12 38 18 38 L30 38 Q36 38 36 32 L36 18" />
        {/* stern eyebrows */}
        <path d="M16 21 L22 22" />
        <path d="M26 22 L32 21" />
        {/* eyes */}
        <circle cx="19" cy="25" r="1" fill={stroke} />
        <circle cx="29" cy="25" r="1" fill={stroke} />
        {/* mouth - determined */}
        <path d="M19 32 L29 32" />
        <path d="M22 32 L22 33.5" />
        <path d="M26 32 L26 33.5" />
      </g>
    ),
    // Xuka: oval face, long hair, bow
    xuka: (
      <g stroke={stroke} strokeWidth={sw} fill="none" strokeLinecap="round" strokeLinejoin="round">
        {/* long hair sides */}
        <path d="M10 20 Q10 12 24 10 Q38 12 38 20 L38 34 Q36 32 34 32 L34 22" fill={p.bg} />
        <path d="M14 22 L14 32 Q12 32 10 34 L10 20" fill={p.bg} />
        {/* face oval */}

        <circle cx="24" cy="10.5" r="1" fill={stroke} />
        {/* eyes - gentle */}
        <path d="M18 24 Q19 22.5 20 24" />
        <path d="M28 24 Q29 22.5 30 24" />
        {/* lashes */}
        <path d="M18 22.5 L17.5 21.8" />
        <path d="M30 22.5 L30.5 21.8" />
        {/* smile */}
        <path d="M22 30 Q24 31.5 26 30" />
      </g>
    ),
    // Chấm công (Dora): friendly round face, antenna/clock hybrid
    chamcong: (
      <g stroke={stroke} strokeWidth={sw} fill="none" strokeLinecap="round" strokeLinejoin="round">
        {/* head */}
        <circle cx="24" cy="24" r="13" />
        {/* antenna-clock hand */}
        <path d="M24 11 L24 7" />
        <circle cx="24" cy="6" r="1.3" fill={p.secondary} stroke="none" />
        {/* inner face ring */}
        <circle cx="24" cy="23" r="8" fill={p.bg} />

        <circle cx="24" cy="16" r="0.6" fill={stroke} />
        <circle cx="31" cy="23" r="0.6" fill={stroke} />
        <circle cx="17" cy="23" r="0.6" fill={stroke} />

        <circle cx="21" cy="22" r="1" fill={stroke} />

        <path d="M21 26 Q24 28 27 26" />

  };

  return (
    <svg width={size} height={size} viewBox="0 0 48 48" style={{ display: 'block' }}>
      <rect width="48" height="48" rx="14" fill={p.bg} />
      {faces[agent.id] || faces.mon}
    </svg>
  );
}

// ============================================================
// Main Avatar dispatcher
// ============================================================
function Avatar({ agent, style = 'geometric', size = 48, monogramVariant = 'duotone' }) {
  if (style === 'monogram') return <AvatarMonogram agent={agent} size={size} variant={monogramVariant} />;
  const map = {
    geometric: AvatarGeometric,
    lineicon: AvatarLineIcon,
    orbit: AvatarOrbit,
    badge: AvatarBadge,
    bot: AvatarBot,
    faces: AvatarFaces,
  };
  const Comp = map[style] || AvatarGeometric;
  return <Comp agent={agent} size={size} />;
}

const AVATAR_STYLES = [
  { id: 'monogram', label: 'Monogram', desc: 'Chữ cái đầu + gradient' },
  { id: 'geometric', label: 'Geometric', desc: 'Hình khối trừu tượng' },
  { id: 'lineicon', label: 'Line Icon', desc: 'Icon theo nhiệm vụ' },
  { id: 'faces', label: 'Faces', desc: 'Mặt nhân vật (line)' },
  { id: 'orbit', label: 'Orbit', desc: 'Quỹ đạo + chấm' },
  { id: 'badge', label: 'Badge', desc: 'Hexagon huy hiệu' },
  { id: 'bot', label: 'Bot Face', desc: 'Khuôn mặt robot' },
];
